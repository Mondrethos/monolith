---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monolith
description: Personal Fedora Atomic image based on UBlue Silverblue Main, with GNOME defaults, gaming tools, Tailscale, Brave Origin, and my preferred apps.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - lilay/topgrade
      files:
        - https://brave-browser-rpm-nightly.s3.brave.com/brave-browser-nightly.repo
        - https://negativo17.org/repos/fedora-steam.repo
      keys:
        - https://brave-browser-rpm-nightly.s3.brave.com/brave-core-nightly.asc
        - https://negativo17.org/repos/RPM-GPG-KEY-slaanesh
    install:
      packages:
        # Basics
        - fish
        - git
        - gh
        - curl
        - btop
        - fastfetch
        # Fonts
        - google-noto-fonts-all
        # Gnome Tools
        - gnome-tweaks
        # Tailscale
        - tailscale
        # Updating helper
        - topgrade
        # Steam/controller support
        - steam-devices
        # Gaming tools
        - gamescope
        - gamemode
        - mangohud
        - vkBasalt
        - vulkan-tools
        - winetricks
        - protontricks
        - evtest
        # Brave Origin
        - brave-origin-nightly
        # Layered Steam RPM
        - steam
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - gnome-software

  - type: systemd
    system:
      enabled:
        - tailscaled.service
        - monolith-firstboot-label.service

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono

  - type: gnome-extensions
    install:
      - AppIndicator and KStatusNotifierItem Support
      - Blur my Shell
      - Clipboard History
      - Tiling Shell
      - Caffeine

  - type: gschema-overrides
    include:
      - zz1-gnome-extensions.gschema.override

  - type: default-flatpaks
    configurations:
      - notify: false
        scope: system
        install:
          - org.gnome.Loupe
          - org.gnome.Papers
          - org.gnome.SimpleScan
          - org.gnome.TextEditor
          - org.gnome.Weather
          - org.gnome.Calendar
          - it.mijorus.gearlever
          - io.github.kolunmi.Bazaar
          - com.ranfdev.DistroShelf
          - com.mattjakeman.ExtensionManager
          - com.vysp3r.ProtonPlus
          - com.github.zocker_160.SyncThingy
          - com.saivert.pwvucontrol
          - org.jellyfin.JellyfinDesktop
          - io.github.getnf.embellish
          - org.cryptomator.Cryptomator
          - io.github.wivrn.wivrn
          - io.github.Faugus.faugus-launcher
          - com.system76.Popsicle
          - com.github.tchx84.Flatseal
          - org.mozilla.Thunderbird
          - com.discordapp.Discord
      - scope: user
        notify: false

  - type: script
    snippets:
      - |
        # Install Bazaar Companion GNOME Shell extension system-wide.
        set -euxo pipefail
        uuid="bazaar-integration@kolunmi.github.io"
        tmpdir="$(mktemp -d)"
        git clone --depth=1 https://github.com/bazaar-org/bazaar-companion "$tmpdir"
        install -d "/usr/share/gnome-shell/extensions/$uuid"
        cp -a "$tmpdir/src/." "/usr/share/gnome-shell/extensions/$uuid/"
        chmod -R a+rX "/usr/share/gnome-shell/extensions/$uuid"
        rm -rf "$tmpdir"
      - |
        # Compile GDM dconf defaults.
        dconf update
        # Preinstall Fisher + Pure into /etc/skel for new users.
        mkdir -p /etc/skel/.config/fish
        tmp="$(mktemp)"
        curl -fsSL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish -o "$tmp"
        env HOME=/etc/skel XDG_CONFIG_HOME=/etc/skel/.config FISHER_BOOTSTRAP="$tmp" fish --no-config -c '
            source "$FISHER_BOOTSTRAP"
            fisher install jorgebucaran/fisher
            fisher install pure-fish/pure
        '
        rm -f "$tmp"

  - type: os-release
    properties:
      NAME: Monolith
      PRETTY_NAME: Monolith
      ID: monolith
      ID_LIKE: fedora
      VARIANT: Silverblue Main
      VARIANT_ID: silverblue
      HOME_URL: https://github.com/Mondrethos/monolith
      DOCUMENTATION_URL: https://github.com/Mondrethos/monolith
      BUG_REPORT_URL: https://github.com/Mondrethos/monolith/issues

  - type: initramfs

  - type: signing
