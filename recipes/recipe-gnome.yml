---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: monolith-gnome
description: Personal Fedora Atomic image (GNOME edition) based on UBlue Silverblue Main, with GNOME defaults, gaming tools, Tailscale, Brave Origin, and my preferred apps.
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  # Shared module stack (files, packages, CachyOS kernel swap, GNOME defaults,
  # extensions, flatpaks, mesa swap, scripts). Edition-specific bits follow.
  - from-file: gnome-base.yml

  - type: os-release
    properties:
      NAME: Monolith
      PRETTY_NAME: Monolith GNOME
      ID: monolith
      ID_LIKE: fedora
      VARIANT: GNOME
      VARIANT_ID: gnome
      HOME_URL: https://github.com/Mondrethos/monolith
      DOCUMENTATION_URL: https://github.com/Mondrethos/monolith
      BUG_REPORT_URL: https://github.com/Mondrethos/monolith/issues

  - type: initramfs

  - type: signing
