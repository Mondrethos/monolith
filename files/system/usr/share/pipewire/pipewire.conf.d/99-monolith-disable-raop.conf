# Disable RAOP / AirPlay sink discovery.
#
# The ublue base ships a symlink
#   /usr/share/pipewire/pipewire.conf.d/50-raop.conf
#       -> ../pipewire.conf.avail/50-raop.conf
# which loads libpipewire-module-raop-discover. That module uses mDNS to find
# AirPlay receivers (e.g. Apple TVs) on the LAN and exposes them as audio sinks.
#
# 50-raop.conf guards the module with `condition = [ { module.raop = !false } ]`,
# so it loads unless module.raop is explicitly false. We set that property here
# instead of touching the base symlink: this is the conf's own designed off
# switch, it lives entirely in /usr, and it edits no user files.
#
# To re-enable RAOP in a future build, delete this file and rebuild. Nothing is
# left behind in /etc or in any user's home.
context.properties = {
    module.raop = false
}
