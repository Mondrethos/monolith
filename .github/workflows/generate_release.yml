name: Generate Release

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      handwritten:
        description: "Optional note to prepend to the changelog"
        required: false

permissions: {}

jobs:
  generate-release:
    name: Generate Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and its git tag
    steps:
      - name: Checkout (full history for commit range)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install skopeo
        run: |
          if ! command -v skopeo >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq skopeo
          fi

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login forge.waywardinn.com -u "${{ github.actor }}" --password-stdin

      - name: Determine previous and current image tags
        id: tags
        run: |
          set -euo pipefail
          # Diff the GNOME base for package tables (the NVIDIA edition is the same
          # base plus the driver). gnome is the canonical base image.
          registry="forge.waywardinn.com/monolith-os"
          image="$registry/gnome"
          echo "image=$image" >> "$GITHUB_OUTPUT"

          # All published editions (recipes/recipe-*.yml is the source of truth),
          # non-NVIDIA first, for the per-edition "How to rebase" section.
          editions=()
          for r in recipes/recipe-*.yml; do
            case "$r" in *nvidia*) ;; *) editions+=("$registry/$(awk '/^name:/{print $2; exit}' "$r")") ;; esac
          done
          for r in recipes/recipe-*.yml; do
            case "$r" in *nvidia*) editions+=("$registry/$(awk '/^name:/{print $2; exit}' "$r")") ;; esac
          done
          ( IFS=,; echo "images=${editions[*]}" >> "$GITHUB_OUTPUT" )

          # Date-stamped tags (YYYYMMDD) are one stable reference per build day.
          mapfile -t dates < <(skopeo list-tags "docker://$image" \
            | jq -r '.Tags[]' | grep -E '^[0-9]{8}$' | sort -u)

          if [ "${#dates[@]}" -lt 2 ]; then
            echo "Need at least two dated builds to diff; found ${#dates[@]}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          prev="${dates[-2]}"
          curr="${dates[-1]}"
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "curr=$curr" >> "$GITHUB_OUTPUT"

          # Human-friendly release/git tags (YYYYMMDD -> YYYY-MM-DD).
          fmt() { echo "${1:0:4}-${1:4:2}-${1:6:2}"; }
          prev_release="$(fmt "$prev")"
          curr_release="$(fmt "$curr")"
          echo "prev_release=$prev_release" >> "$GITHUB_OUTPUT"
          echo "curr_release=$curr_release" >> "$GITHUB_OUTPUT"
          echo "Previous: $prev ($prev_release)  Current: $curr ($curr_release)"

          # The previous release created a git tag at its build commit; use it as
          # the start of the commit range if it resolves in this checkout.
          if git rev-parse --verify --quiet "refs/tags/$prev_release^{commit}" >/dev/null; then
            echo "prev_rev=$prev_release" >> "$GITHUB_OUTPUT"
          else
            echo "prev_rev=" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract package lists from every edition
        if: steps.tags.outputs.skip != 'true'
        run: |
          set -euo pipefail
          qf='%{NAME}\t%{EPOCH}:%{VERSION}-%{RELEASE}\n'
          prev="${{ steps.tags.outputs.prev }}"
          curr="${{ steps.tags.outputs.curr }}"
          mkdir -p pkgs

          # One image on disk at a time (pull -> extract -> remove) to stay within
          # runner disk. An edition with no curr tag isn't in this build (skip it);
          # one with no prev tag is new (empty prev -> everything shows as added).
          IFS=',' read -ra images <<< "${{ steps.tags.outputs.images }}"
          for img in "${images[@]}"; do
            name="${img##*/}"
            if podman run --rm "$img:$curr" rpm -qa --qf "$qf" 2>/dev/null | sort > "pkgs/${name}.curr.txt"; then
              podman rmi "$img:$curr" >/dev/null 2>&1 || true
            else
              echo "skip $name: no '$curr' tag"; rm -f "pkgs/${name}.curr.txt"; continue
            fi
            if podman run --rm "$img:$prev" rpm -qa --qf "$qf" 2>/dev/null | sort > "pkgs/${name}.prev.txt"; then
              podman rmi "$img:$prev" >/dev/null 2>&1 || true
            else
              echo "no '$prev' tag for $name (new edition); treating as all-added"; : > "pkgs/${name}.prev.txt"
            fi
            echo "$name: prev $(wc -l < "pkgs/${name}.prev.txt"), curr $(wc -l < "pkgs/${name}.curr.txt")"
          done

      - name: Generate changelog
        id: changelog
        if: steps.tags.outputs.skip != 'true'
        run: |
          python3 ./.github/workflows/changelog.py \
            --packages-dir pkgs \
            --prev-tag "${{ steps.tags.outputs.prev }}" --curr-tag "${{ steps.tags.outputs.curr }}" \
            --prev-release-tag "${{ steps.tags.outputs.prev_release }}" --curr-release-tag "${{ steps.tags.outputs.curr_release }}" \
            --images "${{ steps.tags.outputs.images }}" \
            --repo "${{ github.repository }}" \
            --workdir . \
            --prev-rev "${{ steps.tags.outputs.prev_rev }}" --curr-rev "${{ github.sha }}" \
            --handwritten "${{ github.event.inputs.handwritten }}" \
            --output ./release.env --changelog ./changelog.md
          cat ./release.env >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.tags.outputs.skip != 'true'
        env:
          FORGEJO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.changelog.outputs.TITLE }}
          TAG: ${{ steps.changelog.outputs.TAG }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # No softprops-equivalent action is wired up for Forgejo here; create the
          # release through the Gitea-compatible API. Forgejo creates the git tag at
          # target_commitish if absent and treats the newest non-draft/non-prerelease
          # release as "latest".
          payload=$(jq -n \
            --arg tag "$TAG" --arg target "$SHA" \
            --arg name "$TITLE" --rawfile body ./changelog.md \
            '{tag_name:$tag, target_commitish:$target, name:$name, body:$body, draft:false, prerelease:false}')
          curl -fsS -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$payload" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases"
