name: Generate Release

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      handwritten:
        description: "Optional note to prepend to the changelog"
        required: false

permissions: {}

jobs:
  generate-release:
    name: Generate Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and its git tag
    steps:
      - name: Checkout (full history for commit range)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install skopeo
        run: |
          if ! command -v skopeo >/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq skopeo
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Determine previous and current image tags
        id: tags
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          image="ghcr.io/${owner,,}/monolith"
          echo "image=$image" >> "$GITHUB_OUTPUT"

          # Date-stamped tags (YYYYMMDD) are one stable reference per build day.
          mapfile -t dates < <(skopeo list-tags "docker://$image" \
            | jq -r '.Tags[]' | grep -E '^[0-9]{8}$' | sort -u)

          if [ "${#dates[@]}" -lt 2 ]; then
            echo "Need at least two dated builds to diff; found ${#dates[@]}. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          prev="${dates[-2]}"
          curr="${dates[-1]}"
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "curr=$curr" >> "$GITHUB_OUTPUT"

          # Human-friendly release/git tags (YYYYMMDD -> YYYY-MM-DD).
          fmt() { echo "${1:0:4}-${1:4:2}-${1:6:2}"; }
          prev_release="$(fmt "$prev")"
          curr_release="$(fmt "$curr")"
          echo "prev_release=$prev_release" >> "$GITHUB_OUTPUT"
          echo "curr_release=$curr_release" >> "$GITHUB_OUTPUT"
          echo "Previous: $prev ($prev_release)  Current: $curr ($curr_release)"

          # The previous release created a git tag at its build commit; use it as
          # the start of the commit range if it resolves in this checkout.
          if git rev-parse --verify --quiet "refs/tags/$prev_release^{commit}" >/dev/null; then
            echo "prev_rev=$prev_release" >> "$GITHUB_OUTPUT"
          else
            echo "prev_rev=" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract package lists from both images
        if: steps.tags.outputs.skip != 'true'
        run: |
          set -euo pipefail
          image="${{ steps.tags.outputs.image }}"
          qf='%{NAME}\t%{EPOCH}:%{VERSION}-%{RELEASE}\n'

          podman run --rm "$image:${{ steps.tags.outputs.prev }}" rpm -qa --qf "$qf" | sort > prev-packages.txt
          podman rmi "$image:${{ steps.tags.outputs.prev }}" || true
          podman run --rm "$image:${{ steps.tags.outputs.curr }}" rpm -qa --qf "$qf" | sort > curr-packages.txt
          podman rmi "$image:${{ steps.tags.outputs.curr }}" || true

          echo "prev: $(wc -l < prev-packages.txt) packages, curr: $(wc -l < curr-packages.txt) packages"

      - name: Generate changelog
        id: changelog
        if: steps.tags.outputs.skip != 'true'
        run: |
          python3 ./.github/workflows/changelog.py \
            --prev-packages prev-packages.txt --curr-packages curr-packages.txt \
            --prev-tag "${{ steps.tags.outputs.prev }}" --curr-tag "${{ steps.tags.outputs.curr }}" \
            --prev-release-tag "${{ steps.tags.outputs.prev_release }}" --curr-release-tag "${{ steps.tags.outputs.curr_release }}" \
            --image "${{ steps.tags.outputs.image }}" \
            --repo "${{ github.repository }}" \
            --workdir . \
            --prev-rev "${{ steps.tags.outputs.prev_rev }}" --curr-rev "${{ github.sha }}" \
            --handwritten "${{ github.event.inputs.handwritten }}" \
            --output ./release.env --changelog ./changelog.md
          cat ./release.env >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.tags.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.changelog.outputs.TITLE }}
          tag_name: ${{ steps.changelog.outputs.TAG }}
          target_commitish: ${{ github.sha }}
          body_path: ./changelog.md
          make_latest: true
