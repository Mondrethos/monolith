name: Generate ISO

# Manually build an installable *live* ISO for a published Monolith image.
#
# We build a live ISO with ublue-os/titanoboa (the same family of tooling
# Bazzite/Bluefin use) rather than an Anaconda installer ISO via
# build-container-installer. The Anaconda ISO hung on a grey screen at the
# end-of-install reboot: its installer environment had no clean way to unmount
# the live medium and detach the loop device at shutdown. A real live ISO boots
# from an initramfs built with dracut-live, which DOES tear that overlay down
# cleanly on reboot -- that is the fix.
#
# titanoboa's contract takes only an image reference; everything the live medium
# needs is baked into the image first. So this workflow builds a transient
# live-prep layer on top of the published edition image (see iso/Containerfile +
# iso/build.sh: dracut-live initramfs, GNOME live session, Anaconda WebUI).
#
# We do NOT use titanoboa's action to master the ISO -- it emits a UEFI-only ISO
# that won't boot under legacy BIOS (GNOME Boxes / VirtualBox defaults, old CSM
# hardware). Instead we run titanoboa's build script (vendored + patched for a
# hybrid BIOS+UEFI ISO at iso/build_iso.sh) in a Fedora container, exactly as
# titanoboa's own main.sh invokes it.
#
# Secure Boot: the ISO is deliberately SB-agnostic (enrollment is image-side via
# `ujust enroll-monolith-secure-boot-key`). Note the live environment runs our
# MOK-signed CachyOS kernel, so with Secure Boot ENABLED in firmware shim will
# not trust it -- boot the ISO with Secure Boot disabled, install, then enroll.
on:
  workflow_dispatch:
    inputs:
      image:
        description: Edition to build an ISO for
        type: choice
        default: gnome-nvidia
        options:
          - gnome-nvidia
          - gnome
      tag:
        description: Published image tag to base the ISO on
        type: string
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-iso:
    name: Generate ISO (${{ inputs.image }}:${{ inputs.tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # Need the iso/ live-prep layer (Containerfile, build.sh, iso.yaml).
      - name: Checkout
        uses: actions/checkout@v4

      # Log in so podman can pull the published edition image from the (private)
      # Forgejo registry to build the live-prep layer on top of.
      - name: Log in to Forgejo registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login forge.waywardinn.com -u "${{ github.actor }}" --password-stdin

      # Build the transient live image on top of the published edition image.
      # sudo podman so the image lands in root's container storage, which is
      # where titanoboa's `sudo podman` reads it from by reference.
      - name: Build live image
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable --squash \
            --build-arg BASE_IMAGE=forge.waywardinn.com/monolith-os/${{ inputs.image }}:${{ inputs.tag }} \
            -t localhost/monolith-live:latest \
            -f iso/Containerfile iso/

      # Master the live image into a HYBRID BIOS+UEFI ISO. We don't use the
      # titanoboa action: it produces a UEFI-only ISO that won't boot under
      # legacy BIOS (GNOME Boxes / VirtualBox defaults, old hardware). Instead we
      # run titanoboa's build script the same way its own main.sh does -- a
      # Fedora container with the live image mounted at /rootfs -- but with our
      # vendored, BIOS-hybrid-patched copy (iso/build_iso.sh). It writes
      # /output/<iso-label>.iso (label comes from iso/iso.yaml).
      - name: Build ISO (hybrid BIOS+UEFI)
        run: |
          mkdir -p output
          sudo podman run --rm \
            --cap-add sys_admin --security-opt label=disable \
            -v ${{ github.workspace }}/iso/build_iso.sh:/src/build_iso.sh:ro \
            --mount type=image,source=localhost/monolith-live:latest,dst=/rootfs \
            -v ${{ github.workspace }}/output:/output \
            quay.io/fedora/fedora:latest \
            bash /src/build_iso.sh

      # Rename to a clean per-edition name and checksum it.
      - name: Stage ISO
        id: stage
        env:
          ISO_NAME: ${{ inputs.image }}-${{ inputs.tag }}.iso
        run: |
          src=$(ls output/*.iso | head -1)
          sudo chown "$(id -u):$(id -g)" "$src"
          mv "$src" "output/$ISO_NAME"
          (cd output && sha256sum "$ISO_NAME" | tee "$ISO_NAME-CHECKSUM")
          ls -lh output/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}-iso
          path: output/
          retention-days: 7
          if-no-files-found: error
