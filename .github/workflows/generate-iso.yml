name: Generate ISO

# Manually build an installable ISO for a published Monolith image. The ISO is
# only packaging + an Anaconda installer; it carries NO signing key. Its only
# Secure Boot role is to pre-stage MOK enrollment: it embeds our PUBLIC cert and
# the enrollment password (below) so the MokManager screen appears on first boot
# and the user just types the password. The trust itself comes from the kernel +
# module signatures baked into the image at build time. The cert here MUST be our
# own (not the BlueBuild/UBlue default), or the enrolled key would not match what
# signed our kernel and Secure Boot would reject it.
#
# We call JasonN3/build-container-installer directly instead of going through
# `bluebuild generate-iso`. The bluebuild wrapper only exposes
# --variant/--secure-boot-url/--enrollment-password and hides `extra_boot_params`,
# which we need: the wrapper's default ISO hangs on a grey screen at the
# end-of-install reboot (systemd#17988 -- the live medium can't be unmounted at
# shutdown, so the reboot stalls until a hard power-cycle; it reproduces in VMs
# because it is inherent to the live image, not the firmware). Driving the action
# directly lets us pass `rd.live.overlay.overlayfs=1` to fix that while keeping
# the same Secure Boot enrollment via the action's native inputs.
on:
  workflow_dispatch:
    inputs:
      image:
        description: Edition to build an ISO for
        type: choice
        default: monolith-gnome-nvidia
        options:
          - monolith-gnome-nvidia
          - monolith-gnome
      tag:
        description: Published image tag to base the ISO on
        type: string
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Our committed public cert + chosen enrollment password (see openssl.cnf and
  # the justfile). Passed to the installer below to pre-stage MOK enrollment.
  SECURE_BOOT_URL: https://github.com/Mondrethos/monolith/raw/main/files/system/etc/pki/akmods/certs/akmods-monolith.der
  ENROLLMENT_PASSWORD: monolith

jobs:
  generate-iso:
    name: Generate ISO (${{ inputs.image }}:${{ inputs.tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # ISO builds need a lot of scratch space (image pull + installer build);
      # reclaim the chunky preinstalled toolchains the runner ships with.
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo docker image prune --all --force || true
          df -h /

      # Build the installer ISO straight from the published image. image_signed
      # is left at its default (true): our `signing` module bakes the cosign
      # policy + public key into the image, which is exactly what this action
      # reads to verify the pull. version must match our Fedora base (recipe
      # image-version: 44).
      - name: Build ISO
        id: build
        uses: JasonN3/build-container-installer@v1.4.0
        with:
          arch: x86_64
          image_repo: ghcr.io/mondrethos
          image_name: ${{ inputs.image }}
          image_tag: ${{ inputs.tag }}
          version: "44"
          variant: Silverblue
          iso_name: ${{ inputs.image }}-${{ inputs.tag }}.iso
          secure_boot_key_url: ${{ env.SECURE_BOOT_URL }}
          enrollment_password: ${{ env.ENROLLMENT_PASSWORD }}
          # Fix for the end-of-install reboot hang (systemd#17988): native
          # overlayfs unmounts cleanly at shutdown where the legacy dm-based live
          # overlay leaves the medium busy and stalls the reboot. No RAM cost
          # (rd.live.ram would need ~16 GB for our ~7 GB image, so it is not an
          # option here).
          extra_boot_params: rd.live.overlay.overlayfs=1

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}-iso
          path: ${{ steps.build.outputs.iso_path }}
          retention-days: 7
          if-no-files-found: error
