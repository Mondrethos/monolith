name: Generate ISO

# Manually build an installable *live* ISO for a published Monolith image.
#
# We build a live ISO with ublue-os/titanoboa (the same family of tooling
# Bazzite/Bluefin use) rather than an Anaconda installer ISO via
# build-container-installer. The Anaconda ISO hung on a grey screen at the
# end-of-install reboot: its installer environment had no clean way to unmount
# the live medium and detach the loop device at shutdown. A real live ISO boots
# from an initramfs built with dracut-live, which DOES tear that overlay down
# cleanly on reboot -- that is the fix.
#
# titanoboa's current contract takes only an image reference; everything the
# live medium needs is baked into the image first. So this workflow builds a
# transient live-prep layer on top of the published edition image (see
# iso/Containerfile + iso/build.sh) and feeds that to titanoboa.
#
# Secure Boot: the ISO is deliberately SB-agnostic (enrollment is image-side via
# `ujust enroll-monolith-secure-boot-key`). Note the live environment runs our
# MOK-signed CachyOS kernel, so with Secure Boot ENABLED in firmware shim will
# not trust it -- boot the ISO with Secure Boot disabled, install, then enroll.
on:
  workflow_dispatch:
    inputs:
      image:
        description: Edition to build an ISO for
        type: choice
        default: monolith-gnome-nvidia
        options:
          - monolith-gnome-nvidia
          - monolith-gnome
      tag:
        description: Published image tag to base the ISO on
        type: string
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-iso:
    name: Generate ISO (${{ inputs.image }}:${{ inputs.tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # ISO builds need a lot of scratch space (image pull + live layer +
      # squashfs); reclaim the chunky preinstalled toolchains the runner ships.
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo docker image prune --all --force || true
          df -h /

      # Need the iso/ live-prep layer (Containerfile, build.sh, iso.yaml).
      - name: Checkout
        uses: actions/checkout@v4

      # Build the transient live image on top of the published edition image.
      # sudo podman so the image lands in root's container storage, which is
      # where titanoboa's `sudo podman` reads it from by reference.
      - name: Build live image
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable --squash \
            --build-arg BASE_IMAGE=ghcr.io/mondrethos/${{ inputs.image }}:${{ inputs.tag }} \
            -t localhost/monolith-live:latest \
            -f iso/Containerfile iso/

      # Turn the live image into a bootable live ISO. titanoboa's main.sh cd's
      # into its own action dir and resolves iso-dest relative to that, so the
      # final path is unpredictable from here -- read it back from the step's
      # iso-dest output rather than assuming a location.
      - name: Build ISO
        id: build
        uses: ublue-os/titanoboa@main
        with:
          image-ref: localhost/monolith-live:latest

      # Move the ISO to a known dir under a clean name and checksum it.
      - name: Stage ISO
        id: stage
        env:
          ISO_SRC: ${{ steps.build.outputs.iso-dest }}
          ISO_NAME: ${{ inputs.image }}-${{ inputs.tag }}.iso
        run: |
          mkdir -p output
          mv "$ISO_SRC" "output/$ISO_NAME"
          (cd output && sha256sum "$ISO_NAME" | tee "$ISO_NAME-CHECKSUM")
          ls -lh output/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}-iso
          path: output/
          retention-days: 7
          if-no-files-found: error
