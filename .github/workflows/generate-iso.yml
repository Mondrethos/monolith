name: Generate ISO

# Manually build an installable ISO for a published Monolith image. The ISO is a
# dumb installer: it pulls the published image and installs it, nothing more. It
# deliberately does NOT touch Secure Boot.
#
# Secure Boot is entirely image-side: the kernel and out-of-tree modules are
# signed at build time with our MOK, the public cert ships inside the image at
# /etc/pki/akmods/certs/akmods-monolith.der, and the user enrolls it after
# install with `ujust enroll-monolith-secure-boot-key`. Pre-staging enrollment
# from the ISO (build-container-installer's secure_boot_key_url/enrollment_password)
# bought only the convenience of skipping that command, and it is an active
# footgun -- if the ISO's key ever drifts from the image's key the machine
# black-screens (cf. ublue/bazzite#688). Keeping the ISO Secure-Boot-agnostic
# also frees us to pick whatever ISO tool reboots cleanly.
#
# We call JasonN3/build-container-installer directly rather than via
# `bluebuild generate-iso` so we can pass `extra_boot_params`.
on:
  workflow_dispatch:
    inputs:
      image:
        description: Edition to build an ISO for
        type: choice
        default: monolith-gnome-nvidia
        options:
          - monolith-gnome-nvidia
          - monolith-gnome
      tag:
        description: Published image tag to base the ISO on
        type: string
        default: latest

concurrency:
  group: ${{ github.workflow }}-${{ inputs.image }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-iso:
    name: Generate ISO (${{ inputs.image }}:${{ inputs.tag }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      # ISO builds need a lot of scratch space (image pull + installer build);
      # reclaim the chunky preinstalled toolchains the runner ships with.
      - name: Maximize build space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}"
          sudo docker image prune --all --force || true
          df -h /

      # Build the installer ISO straight from the published image. image_signed
      # is left at its default (true): our `signing` module bakes the cosign
      # policy + public key into the image, which is exactly what this action
      # reads to verify the pull. version must match our Fedora base (recipe
      # image-version: 44).
      - name: Build ISO
        id: build
        uses: JasonN3/build-container-installer@v1.4.0
        with:
          arch: x86_64
          image_repo: ghcr.io/mondrethos
          image_name: ${{ inputs.image }}
          image_tag: ${{ inputs.tag }}
          version: "44"
          variant: Silverblue
          iso_name: ${{ inputs.image }}-${{ inputs.tag }}.iso
          # Use native overlayfs for the live overlay. NOTE: this alone did NOT
          # resolve the end-of-install reboot hang (systemd#17988) in testing --
          # the reboot fix is still being worked out, and may mean changing ISO
          # tooling now that Secure Boot no longer constrains that choice.
          extra_boot_params: rd.live.overlay.overlayfs=1

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.image }}-${{ inputs.tag }}-iso
          path: ${{ steps.build.outputs.iso_path }}
          retention-days: 7
          if-no-files-found: error
