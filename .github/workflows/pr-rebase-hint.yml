name: PR Rebase Hint

# Post a one-time comment on each PR with the rebase command for that PR's
# test image (pr-<number>-<image-version>), so it can be tried on a real
# install before merging. The tag is constant for the PR's lifetime, so a
# single comment on open is enough.
on:
  pull_request:
    types: [opened, reopened]

permissions: {}

jobs:
  rebase-hint:
    name: Post rebase command
    runs-on: ubuntu-latest
    permissions:
      contents: read # read image-version from the recipe
      pull-requests: write # post the comment
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Comment the PR test-build rebase command
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner="${OWNER,,}"

          # Enumerate every published edition from its recipe (recipes/recipe-*.yml
          # is the single source of truth for the image name + Fedora version), so
          # new editions are picked up automatically without editing this file.
          {
            echo "### 🧪 Test this PR on a real install"
            echo
            echo "**Once the build checks on this PR pass**, a signed test image is published for each edition. Pick the one matching your hardware and, from an existing Monolith install (which already has the signing policy), rebase onto it:"
            echo
          } > body.md

          # List non-NVIDIA editions first (NVIDIA is the niche case), keeping
          # each group in alphabetical order. Generic, so future flavors slot in.
          recipes=()
          for recipe in recipes/recipe-*.yml; do
            [ -e "$recipe" ] || continue
            case "$recipe" in *nvidia*) ;; *) recipes+=("$recipe") ;; esac
          done
          for recipe in recipes/recipe-*.yml; do
            [ -e "$recipe" ] || continue
            case "$recipe" in *nvidia*) recipes+=("$recipe") ;; esac
          done

          found=0
          for recipe in "${recipes[@]}"; do
            name="$(awk '/^name:/{print $2; exit}' "$recipe")"
            version="$(awk '/^image-version:/{print $2; exit}' "$recipe")"
            [ -n "$name" ] && [ -n "$version" ] \
              || { echo "name/image-version not found in $recipe" >&2; exit 1; }
            found=1
            image="ghcr.io/${owner}/${name}"
            tag="pr-${PR_NUMBER}-${version}"
            {
              echo "**\`${name}\`**"
              echo
              echo "\`\`\`bash"
              echo "rpm-ostree rebase ostree-image-signed:docker://${image}:${tag}"
              echo "systemctl reboot"
              echo "\`\`\`"
              echo
            } >> body.md
          done
          [ "$found" -eq 1 ] || { echo "no recipes/recipe-*.yml found" >&2; exit 1; }

          {
            echo "The tags are rebuilt on every new commit here, so \`rpm-ostree upgrade\` pulls the latest build. When you're done testing, return to your edition's released image (\`:latest\`)."
            echo
            echo "_The test tags stop updating once this PR is merged or closed._"
          } >> body.md

          gh pr comment "$PR_NUMBER" --body-file body.md
