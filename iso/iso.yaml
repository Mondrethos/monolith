# Container-native ISO contract v0.1.0 (consumed by ublue-os/titanoboa's
# build_iso.sh). `label` names the ISO volume; the `root=live:CDLABEL=...`
# kernel argument in each entry MUST match it exactly, otherwise dracut-live
# cannot find /LiveOS/squashfs.img on the medium and the live boot fails.
#
# The kernel/initrd paths are fixed by the contract: build_iso.sh always places
# the kernel at /images/pxeboot/vmlinuz and the initramfs at
# /images/pxeboot/initrd.img inside the ISO.
label: "Monolith-Live"
grub2:
  timeout: 10
  default: 0
  entries:
    - name: "Monolith Live"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=Monolith-Live enforcing=0 rd.live.image"
      initrd: "/images/pxeboot/initrd.img"
    - name: "Monolith Live (Safe Graphics)"
      linux: "/images/pxeboot/vmlinuz quiet rhgb root=live:CDLABEL=Monolith-Live enforcing=0 rd.live.image nomodeset"
      initrd: "/images/pxeboot/initrd.img"
